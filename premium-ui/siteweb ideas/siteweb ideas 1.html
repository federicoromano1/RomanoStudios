<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Portfolio | Romano Studios Style</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 100px 20px; background: linear-gradient(180deg, #00ffcc22 0%, #0a0a0a 100%); }
        h1 { font-size: 3rem; color: #00ffcc; text-transform: uppercase; letter-spacing: 5px; }
        .container { max-width: 800px; margin: auto; padding: 50px 20px; }
        .card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 15px; margin-bottom: 20px; transition: 0.3s; }
        .card:hover { border-color: #00ffcc; transform: translateY(-5px); }
        .btn { display: inline-block; padding: 15px 30px; background: #00ffcc; color: #000; text-decoration: none; font-weight: bold; border-radius: 50px; margin-top: 20px; }
        footer { padding: 50px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <h1>Cyber Developer</h1>
        <p>Specialista in Python, C++ e Sicurezza Informatica</p>
        <a href="#" class="btn">CONTATTAMI</a>
    </header>
    <div class="container">
        <div class="card"><h3>Progetto Alpha</h3><p>Automazione industriale in Python.</p></div>
        <div class="card"><h3>Progetto Beta</h3><p>Sistema di difesa firewall in C++.</p></div>
        <div class="card"><h3>Progetto Gamma</h3><p>Web App ultra-veloce in JavaScript.</p></div>
    </div>
    <footer>&copy; 2026 Romano Studios - Tutti i diritti riservati.</footer>
</body>
</html>
