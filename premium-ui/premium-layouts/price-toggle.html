<div class="toggle-container">
    <span class="label">Mensile</span>
    <label class="switch">
        <input type="checkbox" id="price-toggle">
        <span class="slider"></span>
    </label>
    <span class="label">Annuale <small>(-20%)</small></span>
</div>

<style>
.toggle-container { display: flex; align-items: center; gap: 20px; justify-content: center; padding: 20px; }
.label { color: #888; font-weight: bold; font-size: 14px; }
.switch { position: relative; display: inline-block; width: 60px; height: 34px; }
.switch input { opacity: 0; width: 0; height: 0; }

.slider {
    position: absolute; cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #111; border: 1px solid #333;
    transition: .4s; border-radius: 34px;
}

.slider:before {
    position: absolute; content: "";
    height: 26px; width: 26px; left: 4px; bottom: 3px;
    background-color: #fff; transition: .4s; border-radius: 50%;
}

input:checked + .slider { background-color: #00ffcc; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); }
input:checked + .slider:before { transform: translateX(26px); }

small { color: #00ffcc; }
</style>
