<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romano Studios - Ultra Premium Buttons</title>
    <style>
        body {
            background: #080808;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            gap: 60px;
        }

        .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #444;
            margin-bottom: 20px;
        }

        /* --- 1. THE GLITCH BUTTON (Cyber-Style) --- */
        .btn-glitch {
            width: 220px;
            height: 60px;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            outline: none;
            cursor: pointer;
            position: relative;
            background: #000;
        }

        .btn-glitch::after, .btn-glitch::before {
            content: "GLITCH_ON";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
        }

        .btn-glitch:hover::before {
            animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
            color: #00ffff; z-index: -1;
        }

        .btn-glitch:hover::after {
            animation: glitch 0.3s cubic-bezier(.25, .46, .45, .94) reverse both infinite;
            color: #ff00ff; z-index: -2;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        /* --- 2. THE LIQUID NEON (Glow-Style) --- */
        .btn-liquid {
            padding: 18px 45px;
            font-size: 16px;
            font-weight: 700;
            color: #00ffcc;
            background: transparent;
            border: 2px solid #00ffcc;
            border-radius: 8px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.5s;
            text-transform: uppercase;
        }

        .btn-liquid:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 50px #00ffcc;
        }

        /* --- 3. THE GLASS FLOATING (Glassmorphism) --- */
        .btn-glass {
            padding: 20px 40px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #00ffcc;
            transform: translateY(-5px);
            color: #00ffcc;
        }

        /* --- 4. THE 3D SHADOW PRESS (Premium Tactile) --- */
        .btn-3d-premium {
            padding: 16px 36px;
            font-size: 17px;
            font-weight: 900;
            color: white;
            background: #222;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 8px 0 #000, 0 15px 20px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
        }

        .btn-3d-premium:active {
            box-shadow: 0 2px 0 #000;
            transform: translateY(6px);
        }

    </style>
</head>
<body>

    <div style="text-align:center">
        <div class="label">Style 01 - Cyber Glitch</div>
        <button class="btn-glitch">GLITCH_ON</button>
    </div>

    <div style="text-align:center">
        <div class="label">Style 02 - Liquid Neon</div>
        <button class="btn-liquid">Power Up</button>
    </div>

    <div style="text-align:center">
        <div class="label">Style 03 - Floating Glass</div>
        <button class="btn-glass">Luxury Access</button>
    </div>

    <div style="text-align:center">
        <div class="label">Style 04 - Tactile 3D</div>
        <button class="btn-3d-premium">PRESS START</button>
    </div>

</body>
</html>
