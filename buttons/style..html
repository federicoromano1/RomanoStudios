//Lo Stile "Aurora"

<button class="rs-btn-aurora">Inizia Gratis →</button>

<style>
.rs-btn-aurora {
    padding: 12px 24px;
    font-size: 16px;
    font-weight: 600;
    color: white;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Gradiente Blu/Viola */
    border: none;
    border-radius: 50px; /* Completamente arrotondato */
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3); /* Ombra colorata morbida */
    transition: all 0.3s ease;
    font-family: sans-serif;
}

.rs-btn-aurora:hover {
    box-shadow: 0 6px 20px rgba(118, 75, 162, 0.5); /* L'ombra si intensifica */
    transform: translateY(-2px); /* Si alza leggermente */
}

.rs-btn-aurora:active {
    transform: translateY(1px); /* Effetto pressione */
}
</style>

Lo Stile "Cyberpunk Skew" (Angolare e Aggressivo)
<button class="rs-btn-cyber">REDEEM_CODE</button>

<style>
.rs-btn-cyber {
    padding: 12px 30px;
    font-size: 14px;
    font-weight: bold;
    color: #fff;
    background: transparent;
    border: 2px solid #00ffcc; /* Bordo Ciano Neon */
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    font-family: 'Courier New', Courier, monospace; /* Font monospaziato */
    /* Il segreto: Skew (inclinazione) */
    transform: skewX(-15deg); 
}

/* Pseudo-elemento per l'effetto riempimento */
.rs-btn-cyber::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%; /* Parte da fuori */
    width: 100%;
    height: 100%;
    background: #00ffcc;
    transition: all 0.3s ease;
    z-index: -1; /* Va sotto il testo */
}

.rs-btn-cyber:hover {
    color: #000; /* Il testo diventa nero sul ciano */
}

.rs-btn-cyber:hover::before {
    left: 0; /* Riempie il bottone */
}
</style>

//Lo Stile "Retro-Futuristico 3D" (Playful UI)

<button class="rs-btn-3d">Acquista Ora</button>

<style>
.rs-btn-3d {
    padding: 15px 30px;
    font-size: 18px;
    font-weight: bold;
    color: #333;
    background: #ffd700; /* Giallo Oro */
    border: 2px solid #333; /* Bordo scuro spesso */
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    /* L'ombra crea l'effetto 3D */
    box-shadow: 0 5px 0 #333; 
    transition: all 0.1s ease; /* Transizione velocissima per il click */
    font-family: sans-serif;
}

.rs-btn-3d:hover {
    background: #ffdb1a; /* Schiarisce leggermente */
}

/* L'effetto magico quando viene cliccato */
.rs-btn-3d:active {
    box-shadow: 0 1px 0 #333; /* L'ombra quasi sparisce */
    top: 4px; /* Il bottone scende verso il basso */
}
</style>

Il "Minimalista Underline" (Text Button Elegante)

<a href="#" class="rs-btn-underline">Scopri i Progetti</a>

<style>
.rs-btn-underline {
    font-size: 16px;
    font-weight: 500;
    color: #fff;
    text-decoration: none; /* Rimuove la sottolineatura di default */
    position: relative;
    padding-bottom: 5px;
    font-family: sans-serif;
}

/* Pseudo-elemento per la linea personalizzata */
.rs-btn-underline::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2px; /* Spessore della linea */
    background: #fff;
    /* Parte ridotto a zero dal centro */
    transform: scaleX(0); 
    transition: transform 0.3s ease;
}

.rs-btn-underline:hover::after {
    /* Si espande a larghezza piena */
    transform: scaleX(1); 
}
</style>
