<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romano Studios - Premium UI Pack</title>
    <style>
        /* --- STILI GENERALI (Sfondo scuro per far risaltare i componenti) --- */
        body {
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 100px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #555;
            margin-bottom: 10px;
        }

        .container {
            text-align: center;
            border: 1px solid #111;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
        }

        /* --- 1. NAVBAR GLASSMORPHISM --- */
        .rs-navbar {
            position: fixed;
            top: 20px;
            width: 90%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            z-index: 1000;
        }
        .nav-links { display: flex; list-style: none; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { color: white; text-decoration: none; font-size: 14px; opacity: 0.7; transition: 0.3s; }
        .nav-links a:hover { opacity: 1; color: #00ffcc; }

        /* --- 2. BOTTONE AURORA (SaaS) --- */
        .rs-btn-aurora {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
            transition: all 0.3s ease;
        }
        .rs-btn-aurora:hover {
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.5);
            transform: translateY(-2px);
        }

        /* --- 3. BOTTONE CYBERPUNK --- */
        .rs-btn-cyber {
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            color: #00ffcc;
            background: transparent;
            border: 2px solid #00ffcc;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            transform: skewX(-15deg);
        }
        .rs-btn-cyber::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: #00ffcc;
            transition: all 0.3s ease;
            z-index: -1;
        }
        .rs-btn-cyber:hover { color: #000; }
        .rs-btn-cyber:hover::before { left: 0; }

        /* --- 4. BOTTONE 3D RETRO --- */
        .rs-btn-3d {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            background: #ffd700;
            border: 2px solid #333;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 5px 0 #333;
            transition: all 0.1s ease;
        }
        .rs-btn-3d:active {
            box-shadow: 0 1px 0 #333;
            top: 4px;
        }

        /* --- 5. MINIMAL UNDERLINE --- */
        .rs-btn-underline {
            font-size: 16px;
            font-weight: 500;
            color: #fff;
            text-decoration: none;
            position: relative;
            padding-bottom: 5px;
            cursor: pointer;
        }
        .rs-btn-underline::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 2px;
            background: #00ffcc;
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        .rs-btn-underline:hover::after { transform: scaleX(1); }

    </style>
</head>
<body>

    <nav class="rs-navbar">
        <div style="font-weight: bold; letter-spacing: 1px;">ROMANO_STUDIOS</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Shop</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="section-title">SaaS Modern Style</div>
        <button class="rs-btn-aurora">Get Started Free</button>
    </div>

    <div class="container">
        <div class="section-title">Cyberpunk Gaming</div>
        <button class="rs-btn-cyber">Access Database</button>
    </div>

    <div class="container">
        <div class="section-title">Playful 3D UI</div>
        <button class="rs-btn-3d">Buy Now</button>
    </div>

    <div class="container">
        <div class="section-title">Minimalist Link</div>
        <a class="rs-btn-underline">View All Projects</a>
    </div>

</body>
</html>
